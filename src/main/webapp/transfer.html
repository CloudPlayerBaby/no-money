<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>转账</title>
</head>

<body>
<h1>转账给其他人</h1>

<div>
    <label>目标用户</label>
    <input type="text" id="username2">
</div>

<div>
    <label>金额：</label>
    <input type="number" id="amount">
</div>

<div>
    <button onclick="transfer()">确认转账</button>
</div>

<div id="message" style="color:red;"></div>

<div>
    <a href="index.html">返回主页</a>
</div>

<!--引入axios-->
<script src="js/axios-0.18.0.js"></script>

<script>
    function transfer() {
        let amount = document.getElementById("amount").value.trim();
        let username2 = document.getElementById("username2").value.trim();
        let messageDiv = document.getElementById("message");

        //如果金额为空
        if (!amount) {
            //弹出提示信息
            messageDiv.innerText = "请输入金额";
            return;
        }else {
            messageDiv.innerText = '';
        }

        //先转为浮点数，再判断
        if(parseFloat(amount)<=0){
            messageDiv.innerText = "金额必须大于0";
            return;
        }else {
            messageDiv.innerText = '';
        }

        //要把表单提交到/transferServlet
        axios({
            method: "post",
            url: "http://localhost:8080/no-money/bank/transferServlet",
            data: "amount=" + amount +"&username2=" +username2
        }).then(resp => {
            let msg = messageDiv;
            if(resp.data==='success'){
                msg.style.color='green';
                msg.innerText='转账成功';
                document.getElementById('amount').value='';//清空输入框
            }else if(resp.data==='failed'){
                msg.style.color='red';
                msg.innerText='系统错误';
            }else if(resp.data==='amount_err'){
                msg.style.color='red';
                msg.innerText='余额不足，请检查余额后重试';
            }else if(resp.data==='no_user'){
                msg.style.color='red';
                msg.innerText='没有该用户，请确认输入用户名是否正确';
            }else if(resp.data === 'equal_err'){
                msg.style.color='red';
                msg.innerText='不能给自己转账';
            }
            else {
                msg.style.color='red';
                msg.innerText='未知错误';
            }
        })
    }

</script>
</body>
</html>
