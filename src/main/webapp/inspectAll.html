<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>查看所有的流水</title>
</head>
<body>
<h3>所有的交易流水</h3>
<div id="records"></div>

<script src="js/axios-0.18.0.js"></script>

<script>
    axios.get('/no-money/bank/inspectAllServlet')
        .then(resp=>{
            const container = document.getElementById("records");
            let data = resp.data;
            //先做个为空判断
            if(!data||data.length===0){
                container.innerText = '暂无流水记录';
                return;
            }

            //开始拼数据
            let html = '<ul>';
            data.forEach(item=>{
                //如果是存款或者转入，金额前加+，反之加-
                let sign = (item.type==='存款' || item.type==='转入 ')?'+':'-';
                //获取金额和余额，保留2位小数
                let amount = parseFloat(item.amount).toFixed(2);
                let balance = parseFloat(item.balanceAfter).toFixed(2);

                //开始拼一行的内容：[时间] 用户 类型  金额
                // let line = "["+item.time+"] " + item.type + "  " + sign + item.amount + "元  ";
                let line = `[${item.time}] ${item.username} ${item.type} ${sign}${amount}元 `

                //如果是转账，加上对方的信息
                //[时间] 类型  金额  对方：xx
                if(item.type==='转入' || item.type==='转出'){
                    line+=`对方：${item.targetUsername} `;
                }

                //最后加上余额
                line += `余额：${balance}元`;

                html+= `<li>${line}</li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
        })
</script>
<br>
<a href="index.html">返回主页</a>
</body>
</html>
